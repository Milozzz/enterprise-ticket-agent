name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    env:
      # Stub secrets so config doesn't crash on import; tests use mocks/rules fallback
      GOOGLE_API_KEY: "test-key-ci"
      DATABASE_URL: "sqlite+aiosqlite:///./test_ci.db"
      TESTING: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install ruff numpy "python-jose[cryptography]" "redis[hiredis]"

      - name: Lint (ruff)
        run: ruff check app/ --select=E,F,W --ignore=E501

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Run evals (rules-only, no API key needed)
        run: python -m evals.run_evals

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t enterprise-ticket-agent-backend ./backend
